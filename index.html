<!DOCTYPE html>
<html>
<head>
    <title>Project MONTE - SJDM</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-sidebar-v2@3.2.3/css/leaflet-sidebar.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

    <style>
        :root { --bg-sidebar: #ffffff; --text-main: #333333; --card-bg: #ffffff; --border-ui: #ddd; }
        body.dark-theme { --bg-sidebar: #1a1a1a; --text-main: #e0e0e0; --card-bg: #2d2d2d; --border-ui: #444; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; transition: background 0.3s; }
        html, body, #map { height: 100%; width: 100vw; overflow: hidden; }
        #home-btn { position: absolute; top: 15px; left: 60px; z-index: 1100; padding: 10px 15px; background: white; border: 2px solid rgba(0,0,0,0.2); border-radius: 8px; cursor: pointer; font-weight: bold; }
        .leaflet-sidebar-content { background: var(--bg-sidebar); color: var(--text-main); overflow-y: auto !important; height: 100%; }
        #clock-container { background: #2c3e50; color: white; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border-bottom: 4px solid #3498db; }
        #clock-time { font-size: 1.6em; font-weight: bold; font-family: monospace; display: block; }
        
        /* Bot Styling */
        #bot-panel { background: rgba(52, 152, 219, 0.1); border-left: 5px solid #3498db; padding: 12px; border-radius: 8px; margin: 10px 0; font-size: 0.85em; color: var(--text-main); line-height: 1.4; }
        body.dark-theme #bot-panel { background: rgba(52, 152, 219, 0.2); }
        .bot-header { font-weight: bold; color: #2980b9; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }

        .theme-container, .profile-container { display: flex; gap: 5px; margin: 10px 0; background: #eee; padding: 4px; border-radius: 8px; }
        body.dark-theme .theme-container, body.dark-theme .profile-container { background: #444; }
        .theme-btn, .prof-btn { flex: 1; font-size: 0.75em; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .theme-btn.active { background: #3498db; color: white; }
        .prof-btn.active { background: #27ae60; color: white; }
        .mode-container { display: flex; gap: 8px; margin: 15px 0; background: #f0f0f0; padding: 6px; border-radius: 12px; }
        .mode-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; flex-direction: column; align-items: center; }
        .mode-btn.active { background: #2c3e50; color: white; }
        .vehicle-selector { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
        .v-type { padding: 6px 2px; border: 1px solid var(--border-ui); border-radius: 8px; background: var(--card-bg); cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; color: var(--text-main); transition: 0.2s; }
        .v-type.active { border: 2px solid #3498db !important; background: #ebf5fb !important; color: #333; }
        .v-icon { width: 30px; height: 30px; object-fit: contain; margin-bottom: 5px; }
        .sub-select { font-size: 0.55em; margin-top: 3px; width: 90%; border-radius: 3px; border: 1px solid #ccc; padding: 1px; }
        .result-card { background: var(--card-bg); padding: 12px; border: 1px solid var(--border-ui); border-radius: 8px; margin-top: 10px; color: var(--text-main); }
        #origin-box, #dest-box { margin-bottom: 10px; width: 100%; min-height: 45px; }
    </style>
</head>
<body>

    <button id="home-btn" onclick="goHome()">🏠 Return to SJDM</button>

    <div id="sidebar" class="leaflet-sidebar collapsed">
        <div class="leaflet-sidebar-tabs">
            <ul role="tablist">
                <li><a href="#home" role="tab"><i class="fa fa-bars"></i></a></li>
                <li><a href="#planner" role="tab"><i class="fa fa-route"></i></a></li>
                <li><a href="#settings" role="tab"><i class="fa fa-rotate"></i></a></li>
            </ul>
        </div>

        <div class="leaflet-sidebar-content">
            <div class="leaflet-sidebar-pane" id="home">
                <h1 class="leaflet-sidebar-header">MONTE Nav<div class="leaflet-sidebar-close"><i class="fa fa-caret-left"></i></div></h1>
                
                <div id="clock-container">
                    <span id="clock-time">00:00:00</span>
                    <span id="clock-date">Loading Date...</span>
                </div>

                <div id="bot-panel">
                    <div class="bot-header"><i class="fa fa-robot"></i> MONTE Intelligence</div>
                    <div id="bot-message">Monitoring city transit...</div>
                </div>

                <div class="theme-container">
                    <button id="t-light" class="theme-btn" onclick="setTheme('light')">Light</button>
                    <button id="t-dark" class="theme-btn" onclick="setTheme('dark')">Dark</button>
                    <button id="t-auto" class="theme-btn active" onclick="setTheme('auto')">Auto</button>
                </div>

                <div class="profile-container">
                    <button class="prof-btn active" onclick="setProfile('regular', this)">Regular</button>
                    <button class="prof-btn" onclick="setProfile('student', this)">Student</button>
                    <button class="prof-btn" onclick="setProfile('senior', this)">Senior/PWD</button>
                </div>

                <div class="mode-container">
                    <button id="mode-public" class="mode-btn active" onclick="switchMainMode('public')"><span>Public</span></button>
                    <button id="mode-private" class="mode-btn" onclick="switchMainMode('private')"><span>Private</span></button>
                </div>

                <div id="public-selector" class="vehicle-selector">
                    <div class="v-type active" id="btn-jeep" onclick="setSubVehicle('jeep', this)">
                        <img src="puj.png" class="v-icon" onerror="this.src='https://placehold.co/30?text=Jeep'">
                        <select id="jeep-type" class="sub-select" onchange="updateMONTE()">
                            <option value="traditional">Trad. Jeep</option>
                            <option value="modern">Modern Jeep</option>
                        </select>
                    </div>
                    <div class="v-type" id="btn-bus" onclick="setSubVehicle('bus', this)">
                        <img src="bus.png" class="v-icon" onerror="this.src='https://placehold.co/30?text=Bus'">
                        <select id="bus-type" class="sub-select" onchange="updateMONTE()">
                            <option value="regular">Regular</option>
                            <option value="p2p">P2P Bus</option>
                        </select>
                    </div>
                    <div class="v-type" id="btn-trike" onclick="setSubVehicle('trike', this)">
                        <img src="tri.png" class="v-icon" onerror="this.src='https://placehold.co/30?text=Trike'">
                        <select id="trike-mode" class="sub-select" onchange="updateMONTE()">
                            <option value="regular">Regular (Shared)</option>
                            <option value="special-1">Special (1p)</option>
                            <option value="special-2">Special (2p)</option>
                            <option value="special-3">Special (3p)</option>
                        </select>
                    </div>
                    <div class="v-type" id="btn-uv" onclick="setSubVehicle('uv', this)">
                        <img src="UV.png" class="v-icon" onerror="this.src='https://placehold.co/30?text=UV'">
                        <span>UV Exp</span>
                    </div>
                    <div class="v-type" id="btn-lrt" onclick="setSubVehicle('lrt', this)">
                        <i class="fa fa-train-subway" style="font-size: 1.4em; margin-bottom:5px;"></i>
                        <span>LRT-7</span>
                    </div>
                </div>

                <div id="private-selector" class="vehicle-selector" style="display:none;">
                    <div class="v-type active" id="btn-moto" onclick="setSubVehicle('moto', this)"><i class="fa fa-motorcycle" style="font-size: 1.5em;"></i><span>Moto</span></div>
                    <div class="v-type" id="btn-car" onclick="setSubVehicle('car', this)"><i class="fa fa-car-side" style="font-size: 1.5em;"></i><span>Car</span></div>
                </div>

                <div class="result-card" id="main-result-card" style="border-top: 4px solid #27ae60;">
                    <div id="public-fare-box">
                        <strong>Est. Fare</strong>
                        <div style="font-size: 1.5em; font-weight: bold; color: #27ae60;" id="fare-display">₱ 0.00</div>
                    </div>
                    <div id="private-dist-box" style="display:none;">
                        <div style="display: flex; justify-content: space-between;">
                            <div><strong>Distance</strong><div id="dist-display">0.00 km</div></div>
                            <div><strong>Est. Arrival</strong><div id="time-display">--:--</div></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="leaflet-sidebar-pane" id="settings">
                <h1 class="leaflet-sidebar-header">System Controls<div class="leaflet-sidebar-close"><i class="fa fa-caret-left"></i></div></h1>
                <div style="padding: 20px 10px;">
                    <button onclick="resetMarkers()" style="width: 100%; padding: 15px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                        <i class="fa fa-trash"></i> Reset All Markers
                    </button>
                    <p style="font-size: 0.8em; color: #888; margin-top: 10px; text-align: center;">This will clear your current origin and destination points.</p>
                </div>
            </div>

            <div class="leaflet-sidebar-pane" id="planner">
                <h1 class="leaflet-sidebar-header">Route Details<div class="leaflet-sidebar-close"><i class="fa fa-caret-left"></i></div></h1>
                <div style="padding-top:15px;">
                    <div id="origin-box"></div>
                    <div id="dest-box"></div>
                    <div class="result-card" id="traffic-card" style="border-left: 5px solid #ccc;">
                        <i id="traffic-icon" class="fa fa-clock"></i>
                        <strong id="traffic-status">Analyzing Traffic...</strong>
                        <div id="traffic-desc">Waiting for input...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-sidebar-v2@3.2.3/js/leaflet-sidebar.min.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script>
        var sjdm = [14.8114, 121.0450];
        var originMarker, destMarker, routingControl, walkingRouteControl;
        var userProfile = 'regular', currentMode = 'public', currentVehicle = 'jeep';
        var terminalData = { features: [] };
        var todaLayer = L.layerGroup(); 
        var clickCount = 0;

        // Bot Knowledge: Specific SJDM Zones
        const sjdmZones = [
            { name: "SM San Jose / Mall Zone", coords: [14.8015, 121.0471], radius: 0.5, msg: "Heavy foot traffic near the mall area. Watch for jeepney queues." },
            { name: "Muzon Crossroads", coords: [14.8115, 121.0035], radius: 0.4, msg: "High congestion at Muzon intersection. Expect slow movement." },
            { name: "CSanSci / School Zone", coords: [14.8214, 121.0550], radius: 0.3, msg: "Student activity zone detected. Drive carefully." }
        ];

        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        var map = L.map('map', { zoomControl: false, layers: [osm] }).setView(sjdm, 13);
        var sidebar = L.control.sidebar({ container: 'sidebar' }).addTo(map);

        fetch('Tricycle_Toda.geojson') 
            .then(res => res.json())
            .then(data => {
                terminalData = data;
                L.geoJSON(data, {
                    pointToLayer: (f, ll) => L.circleMarker(ll, { radius: 6, fillColor: "#e67e22", color: "#fff", weight: 2, fillOpacity: 0.9 }),
                    onEachFeature: (f, l) => l.bindPopup("<b>" + (f.properties.Name || "Terminal") + "</b>")
                }).addTo(todaLayer);
            });

        function getDistance(lat1, lon1, lat2, lon2) {
            var R = 6371;
            var dLat = (lat2-lat1)*Math.PI/180;
            var dLon = (lon2-lon1)*Math.PI/180;
            var a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function resetMarkers() {
            clickCount = 0;
            if (originMarker) { map.removeLayer(originMarker); originMarker = null; }
            if (destMarker) { map.removeLayer(destMarker); destMarker = null; }
            if (routingControl) { map.removeControl(routingControl); routingControl = null; }
            if (walkingRouteControl) { map.removeControl(walkingRouteControl); walkingRouteControl = null; }
            
            document.getElementById('fare-display').innerText = "₱ 0.00";
            document.getElementById('dist-display').innerText = "0.00 km";
            document.getElementById('time-display').innerText = "--:--";
            document.getElementById('traffic-status').innerText = "Analyzing Traffic...";
            document.getElementById('traffic-desc').innerText = "Waiting for input...";
            document.getElementById('bot-message').innerText = "Monitoring city transit...";
        }

        function updateTrafficStatus() {
            const hour = new Date().getHours();
            let status = { label: "Light", desc: "Smooth flow", multiplier: 1, icon: "fa-check-circle", color: "#27ae60" };
            let botText = "Roads look clear for SJDM today. Enjoy your trip!";

            // Check Time-based traffic
            if ((hour >= 6 && hour <= 9) || (hour >= 16 && hour <= 19)) {
                status = { label: "Heavy Rush Hour", desc: "Expect significant delays", multiplier: 1.8, icon: "fa-exclamation-triangle", color: "#e74c3c" };
                botText = "🛑 <b>Rush Hour Alert:</b> Traffic is heavy on main arteries. Plan for delays.";
            } else if (hour >= 10 && hour <= 15) {
                status = { label: "Moderate", desc: "Normal city traffic", multiplier: 1.3, icon: "fa-clock", color: "#f1c40f" };
                botText = "Traffic is moderate. Transit times are within normal range.";
            }

            // Check Zone-based traffic (if destination exists)
            if (destMarker) {
                const dl = destMarker.getLatLng();
                sjdmZones.forEach(zone => {
                    if (getDistance(dl.lat, dl.lng, zone.coords[0], zone.coords[1]) < zone.radius) {
                        botText = `📍 <b>${zone.name}:</b> ${zone.msg}`;
                    }
                });
            }

            const card = document.getElementById('traffic-card');
            card.style.borderLeft = "5px solid " + status.color;
            document.getElementById('traffic-icon').className = "fa " + status.icon;
            document.getElementById('traffic-status').innerText = status.label;
            document.getElementById('traffic-desc').innerText = status.desc;
            document.getElementById('bot-message').innerHTML = botText;
            
            return status.multiplier;
        }

        function calculatePublicFare(dist) {
            let total = 0;
            const isDiscounted = (userProfile !== 'regular');

            if (currentVehicle === 'jeep') {
                total = (dist <= 4) ? 13 : 13 + (Math.ceil(dist - 4) * 1.50);
            } else if (currentVehicle === 'bus') {
                total = (dist <= 5) ? 15 : 15 + (Math.ceil(dist - 5) * 2.65);
            } else if (currentVehicle === 'trike') {
                let baseFare = (dist <= 2) ? 12 : 12 + (Math.ceil(dist - 2) * 5);
                const triMode = document.getElementById('trike-mode').value;
                if (triMode === 'regular') {
                    total = baseFare;
                } else {
                    const multipliers = { "special-1": 4, "special-2": 2, "special-3": 1.5 };
                    total = baseFare * (multipliers[triMode] || 1);
                }
            }
            
            if (isDiscounted) total *= 0.8;
            document.getElementById('fare-display').innerText = "₱ " + total.toFixed(2);
        }

        function updateMONTE() {
            if (!originMarker || !destMarker) return;
            if (routingControl) map.removeControl(routingControl);
            
            let start = originMarker.getLatLng(); 

            if (currentMode === 'public' && currentVehicle === 'trike') {
                const res = findNearestToda(start);
                if (res.terminal) start = L.latLng(res.terminal.geometry.coordinates[1], res.terminal.geometry.coordinates[0]);
            }

            let routeProfile = 'car';
            let pathColor = currentMode === 'public' ? '#27ae60' : '#3498db';

            if (currentVehicle === 'moto') {
                routeProfile = 'bicycle';
                pathColor = '#e67e22'; 
            }

            const trafficMult = updateTrafficStatus();

            routingControl = L.Routing.control({
                waypoints: [start, destMarker.getLatLng()],
                router: L.Routing.osrmv1({ 
                    serviceUrl: 'https://router.project-osrm.org/route/v1',
                    profile: routeProfile 
                }),
                createMarker: () => null,
                lineOptions: { styles: [{ color: pathColor, weight: 6, opacity: 0.8 }] }
            }).on('routesfound', e => {
                let d = e.routes[0].summary.totalDistance / 1000;
                let t = Math.round((e.routes[0].summary.totalTime / 60) * trafficMult);

                if (currentMode === 'public') {
                    calculatePublicFare(d);
                    document.getElementById('public-fare-box').style.display = 'block';
                    document.getElementById('private-dist-box').style.display = 'none';
                } else {
                    document.getElementById('public-fare-box').style.display = 'none';
                    document.getElementById('private-dist-box').style.display = 'block';
                    document.getElementById('dist-display').innerText = d.toFixed(2) + " km";
                    
                    let arrival = new Date();
                    arrival.setMinutes(arrival.getMinutes() + t);
                    document.getElementById('time-display').innerText = arrival.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }
            }).addTo(map);
        }

        function findNearestToda(ll) {
            let nearest = null, minD = Infinity;
            terminalData.features.forEach(f => {
                let d = getDistance(ll.lat, ll.lng, f.geometry.coordinates[1], f.geometry.coordinates[0]);
                if (d < minD) { minD = d; nearest = f; }
            });
            return { terminal: nearest, distance: minD };
        }

        function checkNearestTodaUI(ll) {
            if (currentVehicle !== 'trike' || currentMode !== 'public') return;
            const res = findNearestToda(ll);
            if (walkingRouteControl) map.removeControl(walkingRouteControl);
            if (res.terminal) {
                walkingRouteControl = L.Routing.control({
                    waypoints: [ll, L.latLng(res.terminal.geometry.coordinates[1], res.terminal.geometry.coordinates[0])],
                    router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1', profile: 'foot' }),
                    createMarker: () => null,
                    lineOptions: { styles: [{ color: '#3498db', weight: 4, dashArray: '5, 10' }] }
                }).addTo(map);
            }
        }

        function setupMarker(ll, isOrigin) {
            let m = L.marker(ll, {draggable: true}).addTo(map).on('dragend', e => {
                if (isOrigin) checkNearestTodaUI(e.target.getLatLng());
                updateMONTE();
            });
            if (isOrigin) { if(originMarker) map.removeLayer(originMarker); originMarker = m; checkNearestTodaUI(ll); }
            else { if(destMarker) map.removeLayer(destMarker); destMarker = m; }
            updateMONTE();
        }

        map.on('click', e => {
            clickCount++;
            if (clickCount === 1) setupMarker(e.latlng, true);
            else if (clickCount === 2) setupMarker(e.latlng, false);
            else resetMarkers();
        });

        function switchMainMode(m) {
            currentMode = m;
            document.getElementById('mode-public').className = m==='public'?'mode-btn active':'mode-btn';
            document.getElementById('mode-private').className = m==='private'?'mode-btn active':'mode-btn';
            document.getElementById('public-selector').style.display = m==='public'?'grid':'none';
            document.getElementById('private-selector').style.display = m==='private'?'grid':'none';
            if(m === 'private' && walkingRouteControl) map.removeControl(walkingRouteControl);
            updateMONTE();
        }

        function setSubVehicle(t, el) {
            currentVehicle = t;
            document.querySelectorAll('.v-type').forEach(v => v.classList.remove('active'));
            el.classList.add('active');
            if (t === 'trike' && currentMode === 'public') { todaLayer.addTo(map); if(originMarker) checkNearestTodaUI(originMarker.getLatLng()); }
            else { map.removeLayer(todaLayer); if(walkingRouteControl) map.removeControl(walkingRouteControl); }
            updateMONTE();
        }

        function setProfile(p, el) { 
            userProfile = p; 
            document.querySelectorAll('.prof-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            updateMONTE(); 
        }

        function setTheme(m) { 
            if(m === 'dark') document.body.classList.add('dark-theme');
            else document.body.classList.remove('dark-theme');
        }

        function goHome() { map.flyTo(sjdm, 13); }

        var gO = L.Control.geocoder({ defaultMarkGeocode: false }).on('markgeocode', e => setupMarker(e.geocode.center, true)).addTo(map);
        document.getElementById('origin-box').appendChild(gO.getContainer());
        var gD = L.Control.geocoder({ defaultMarkGeocode: false }).on('markgeocode', e => setupMarker(e.geocode.center, false)).addTo(map);
        document.getElementById('dest-box').appendChild(gD.getContainer());

        function updateClock() {
            const now = new Date();
            document.getElementById('clock-time').innerText = now.toLocaleTimeString();
            document.getElementById('clock-date').innerText = now.toLocaleDateString(undefined, { weekday: 'short', month: 'long', day: 'numeric', year: 'numeric' });
            updateTrafficStatus(); // Update bot and traffic every minute
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
